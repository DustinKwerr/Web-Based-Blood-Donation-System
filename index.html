<!-- 
================================================================================
BLOOD BANK PORTAL: IDENTIFIER
================================================================================
[ELEMENT IDs]
* #mainAppWidget      : Main application container (now visible by default).
* #adminMenu          : Container for administrative navigation links.
* #userWelcomeDisplay : Span/Div used to show the current user's name.
* #tab-home           : Dashboard splash screen section.
* #tab-profile        : User profile/registration form section.
* #regName            : Input field for donor full name.
* #regBirthdate       : Input field for donor birth date.
* #regAge             : Read-only field for calculated age.
* #regWeight          : Input field for donor weight.
* #regContact         : Input field for contact information.
* #regBlood           : Dropdown for blood type selection.
* #regOutput          : Feedback area for registration status.
* #tab-eligibility    : Donation eligibility questionnaire section.
* #chkAge             : Input for eligibility age check.
* #chkWeight          : Input for eligibility weight check.
* #chkMonths          : Input for time since last donation.
* #chkIllness         : Dropdown for current health status.
* #chkOutput          : Feedback area for eligibility result.
* #tab-locations      : Interactive list of donation centers.
* #tab-inventory      : Section for viewing current blood stock (Admin).
* #inventoryDisplay   : Textarea used to output stock data.
* #tab-search         : Section for searching donor records (Admin).
* #searchInput        : Input field for search queries.
* #searchMode         : Dropdown to toggle search filters.
* #searchOutput       : Textarea used to output record results.

[STYLESHEET CLASSES]
* .tab-content        : Identifies panels managed by the tab-switching logic.
* .menu-trigger       : Styling for navigation dropdown buttons.
* .dropdown-menu      : Container for hidden-on-hover navigation links.
* .dropdown-item      : Individual link within a dropdown menu.
* .form-row           : Layout container for label/input pairs.
* .form-input         : Standard styling for all form control elements.
* .btn-primary        : Styling for main action buttons (Crimson theme).
* .location-card      : Styling for donation center selection buttons.
* .display-box        : Styling for read-only data output textareas.
================================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Bank Core - LifeSaver Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <!-- Primary Application View -->
    <div id="mainAppWidget" class="flex flex-col flex-1">
        <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shadow-sm">
            <div class="flex space-x-6">
                <div class="relative group">
                    <button class="menu-trigger">Profile ▼</button>
                    <div class="dropdown-menu">
                        <a href="#" onclick="switchTab('profile')" class="dropdown-item">My Profile</a>
                        <a href="#" onclick="logout()" class="dropdown-item text-red-600 border-t border-gray-100">Logout</a>
                    </div>
                </div>

                <div class="relative group">
                    <button class="menu-trigger">Actions ▼</button>
                    <div class="dropdown-menu">
                        <a href="#" onclick="switchTab('eligibility')" class="dropdown-item">Verify Eligibility</a>
                        <a href="#" onclick="switchTab('locations')" class="dropdown-item">Donation Locations</a>
                    </div>
                </div>

                <div id="adminMenu" class="relative group hidden">
                    <button class="menu-trigger">Admin ▼</button>
                    <div class="dropdown-menu">
                        <a href="#" onclick="switchTab('inventory')" class="dropdown-item">Inventory</a>
                        <a href="#" onclick="switchTab('search')" class="dropdown-item">Search Records</a>
                    </div>
                </div>
            </div>
            <div id="userWelcomeDisplay" class="text-sm font-medium text-gray-600"></div>
        </header>

        <main class="flex-1 max-w-6xl w-full mx-auto p-6">
            
            <!-- Home Tab -->
            <div id="tab-home" class="tab-content block bg-white border border-gray-200 rounded-lg p-16 text-center shadow-sm">
                <h2 class="text-4xl font-bold text-gray-800 mb-2">Welcome to Blood Bank Portal</h2>
                <p class="text-lg text-gray-500">Your contribution saves lives. Thank you for being a hero.</p>
            </div>

            <!-- Profile Tab -->
            <div id="tab-profile" class="tab-content hidden bg-white border border-gray-200 rounded-lg p-8 max-w-2xl mx-auto shadow-sm">
                <h3 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">My Profile / Register</h3>
                <div class="space-y-4">
                    <div class="form-row"><label>Full Name:</label><input type="text" id="regName" class="form-input"></div>
                    <div class="form-row"><label>Birth Date:</label><input type="text" id="regBirthdate" placeholder="YYYY-MM-DD" class="form-input"></div>
                    <div class="form-row"><label>Age:</label><input type="text" id="regAge" readonly class="form-input bg-gray-100 text-gray-500"></div>
                    <div class="form-row"><label>Weight (kg):</label><input type="text" id="regWeight" class="form-input"></div>
                    <div class="form-row"><label>Contact:</label><input type="text" id="regContact" class="form-input"></div>
                    <div class="form-row"><label>Blood Group:</label>
                        <select id="regBlood" class="form-input">
                            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                            <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
                        </select>
                    </div>
                    <button onclick="processRegistration()" class="btn-primary w-full">Save Profile</button>
                    <p id="regOutput" class="text-center font-medium"></p>
                </div>
            </div>

            <!-- Eligibility Tab -->
            <div id="tab-eligibility" class="tab-content hidden bg-white border border-gray-200 rounded-lg p-8 max-w-2xl mx-auto shadow-sm">
                <h3 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">Eligibility Check</h3>
                <div class="space-y-4">
                    <div class="form-row"><label>Age:</label><input type="number" id="chkAge" class="form-input"></div>
                    <div class="form-row"><label>Weight (kg):</label><input type="number" id="chkWeight" class="form-input"></div>
                    <div class="form-row"><label>Months Since Last Donation:</label><input type="number" id="chkMonths" class="form-input"></div>
                    <div class="form-row"><label>Current Illness?</label>
                        <select id="chkIllness" class="form-input">
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                    <button onclick="verifyEligibility()" class="btn-primary w-full">Verify Eligibility</button>
                    <div id="chkOutput" class="text-center text-xl font-bold p-2 rounded"></div>
                </div>
            </div>

            <!-- Locations Tab -->
            <div id="tab-locations" class="tab-content hidden bg-white border border-gray-200 rounded-lg p-8 shadow-sm">
                <h3 class="text-2xl font-bold text-gray-800 mb-6">Donation Locations</h3>
                <div class="space-y-4 max-h-[450px] overflow-y-auto pr-2">
                    <button onclick="bookAppointment('City General Hospital')" class="location-card">
                        <div class="font-bold text-gray-800 text-lg">City General Hospital</div>
                        <div class="text-gray-500">123 Main St, Downtown - Open 8AM-6PM</div>
                    </button>
                    <button onclick="bookAppointment('Red Cross Blood Center')" class="location-card">
                        <div class="font-bold text-gray-800 text-lg">Red Cross Blood Center</div>
                        <div class="text-gray-500">45 Medical Avenue - Open Daily</div>
                    </button>
                    <button onclick="bookAppointment('University Medical Campus')" class="location-card">
                        <div class="font-bold text-gray-800 text-lg">University Medical Campus</div>
                        <div class="text-gray-500">University Drive - Weekend Drives</div>
                    </button>
                </div>
            </div>

            <!-- Inventory Tab (Admin) -->
            <div id="tab-inventory" class="tab-content hidden bg-white border border-gray-200 rounded-lg p-8 shadow-sm">
                <h3 class="text-2xl font-bold text-gray-800 mb-4">Live Blood Inventory</h3>
                <textarea id="inventoryDisplay" readonly class="display-box h-64 mb-4"></textarea>
                <button onclick="loadInventory()" class="btn-primary w-auto px-6">Refresh Inventory</button>
            </div>

            <!-- Search Tab (Admin) -->
            <div id="tab-search" class="tab-content hidden bg-white border border-gray-200 rounded-lg p-8 shadow-sm">
                <h3 class="text-2xl font-bold text-gray-800 mb-6">Search Records</h3>
                <div class="space-y-4 max-w-2xl">
                    <div class="form-row"><label>Search Term:</label><input type="text" id="searchInput" class="form-input"></div>
                    <div class="form-row"><label>Search By:</label>
                        <select id="searchMode" class="form-input">
                            <option>Name</option>
                            <option>Blood Type</option>
                        </select>
                    </div>
                    <button onclick="handleSearch()" class="btn-primary w-auto px-6">Search</button>
                    <div class="mt-4">
                        <label class="block font-medium text-gray-700 mb-1">Results:</label>
                        <textarea id="searchOutput" readonly class="display-box h-40"></textarea>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
